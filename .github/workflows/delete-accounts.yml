name: Delete expired accounts

on:
  schedule:
    - cron: '0 2 * * *'  # каждую ночь в 02:00 UTC
  workflow_dispatch:       # можно запустить вручную

jobs:
  delete-expired:
    runs-on: ubuntu-latest
    steps:
      - name: Delete accounts marked for deletion 30+ days ago
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          curl -s -X POST "$SUPABASE_URL/rest/v1/rpc/delete_expired_accounts" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json"
          echo "Done"
