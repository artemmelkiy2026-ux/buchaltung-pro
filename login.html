<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MelaLogic — Anmelden</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #3b82f6;
            --blue-dark: #2563eb;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-400: #94a3b8;
            --slate-600: #475569;
            --slate-900: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.05);
            border: 1px solid var(--slate-200);
        }

        .logo-wrap { text-align: center; margin-bottom: 32px; }
        .logo-wrap img { height: 48px; width: auto; margin-bottom: 8px; }
        .logo-sub { font-size: 12px; color: var(--slate-400); font-weight: 500; }

        .tabs { display: flex; background: var(--slate-100); border-radius: 12px; padding: 4px; margin-bottom: 24px; }
        .tab { 
            flex: 1; padding: 10px; border: none; border-radius: 9px; 
            font-size: 13px; font-weight: 600; cursor: pointer; 
            transition: all .2s; background: transparent; color: var(--slate-400); font-family: inherit;
        }
        .tab.active { background: var(--blue); color: #fff; }

        .google-btn {
            width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
            background: #fff; border: 1.5px solid var(--slate-200); border-radius: 12px;
            padding: 12px; font-size: 14px; font-weight: 500; cursor: pointer;
            margin-bottom: 20px; transition: all .2s; font-family: inherit;
        }
        .google-btn:hover { border-color: var(--blue); background: var(--slate-50); }

        .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .divider hr { flex: 1; border: none; border-top: 1px solid var(--slate-200); }
        .divider span { font-size: 11px; color: var(--slate-400); font-weight: 600; text-transform: uppercase; }

        .field { position: relative; margin-bottom: 12px; }
        .field input {
            width: 100%; background: var(--slate-50); border: 1.5px solid var(--slate-200);
            border-radius: 12px; color: var(--slate-900); padding: 13px 16px;
            font-size: 14px; outline: none; transition: all .2s; font-family: inherit;
        }
        .field input:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .field input.has-eye { padding-right: 46px; }
        .eye { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--slate-400); font-size: 18px; user-select: none; }

        .remember { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
        .remember input { width: 16px; height: 16px; accent-color: var(--blue); cursor: pointer; }
        .remember label { font-size: 13px; color: var(--slate-600); cursor: pointer; }

        .error { color: #ef4444; font-size: 12px; min-height: 18px; margin-bottom: 10px; text-align: center; font-weight: 500; }

        .submit-btn {
            width: 100%; background: var(--blue); border: none; border-radius: 12px; color: #fff;
            padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer;
            transition: all .2s; font-family: inherit;
        }
        .submit-btn:hover { background: var(--blue-dark); }

        .footer { text-align: center; margin-top: 24px; font-size: 11px; color: var(--slate-400); }

        @media (max-width: 480px) {
            body { padding: 0; align-items: flex-start; background: #fff; }
            .card { width: 100%; min-height: 100vh; border-radius: 0; border: none; box-shadow: none; padding: 60px 24px; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-wrap">
        <img src="MelaLogic-logo.svg" alt="MelaLogic">
        <div class="logo-sub">Für Kleinunternehmer & Regelbesteuerung</div>
    </div>

    <div class="tabs">
        <button id="tab-login" class="tab active" onclick="setTab('login')">Anmelden</button>
        <button id="tab-register" class="tab" onclick="setTab('register')">Registrieren</button>
    </div>

    <button class="google-btn" onclick="loginGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.58-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Mit Google anmelden
    </button>

    <div class="divider">
        <hr><span>oder</span><hr>
    </div>

    <div class="field">
        <input id="auth-email" type="email" placeholder="E-Mail-Adresse" autocomplete="email">
    </div>

    <div class="field">
        <input id="auth-password" type="password" placeholder="Passwort" autocomplete="current-password" class="has-eye">
        <span class="eye" onclick="togglePwd('auth-password',this)">👁</span>
    </div>

    <div class="field" id="confirm-wrap" style="display:none">
        <input id="auth-password2" type="password" placeholder="Passwort wiederholen" class="has-eye">
        <span class="eye" onclick="togglePwd('auth-password2',this)">👁</span>
    </div>

    <div class="remember" id="remember-wrap">
        <input type="checkbox" id="auth-remember">
        <label for="auth-remember">Angemeldet bleiben</label>
    </div>

    <div class="error" id="auth-error"></div>

    <button class="submit-btn" id="auth-btn" onclick="submit()">Anmelden</button>

    <div class="footer">© 2026 MelaLogic · Datenschutz</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPA_URL = 'https://dvmhstytoonpacxwdxuj.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; 
    const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

    let isLogin = true;

    function setTab(tab) {
        isLogin = tab === 'login';
        document.getElementById('tab-login').classList.toggle('active', isLogin);
        document.getElementById('tab-register').classList.toggle('active', !isLogin);
        document.getElementById('confirm-wrap').style.display = isLogin ? 'none' : 'block';
        document.getElementById('remember-wrap').style.display = isLogin ? 'flex' : 'none';
        document.getElementById('auth-btn').textContent = isLogin ? 'Anmelden' : 'Registrieren';
    }

    function togglePwd(id, btn) {
        const inp = document.getElementById(id);
        inp.type = inp.type === 'password' ? 'text' : 'password';
        btn.textContent = inp.type === 'password' ? '👁' : '🙈';
    }

    async function submit() {
        // Deine Submit-Funktion
    }
</script>
</body>
</html>
