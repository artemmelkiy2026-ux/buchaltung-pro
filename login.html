<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MelaLogic — Anmelden</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #f0f4f8;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.card {


  padding: 44px 40px;
  width: 420px;
  max-width: 100%;

}

/* Логотип */
.logo-wrap {
  text-align: center;
  margin-bottom: 32px;
}
.logo-wrap img {
  height: 50px;
  width: auto;
}
.logo-sub {
  font-size: 12px;
  color: #343434;
  margin-top: 8px;
}

/* Вкладки */
.tabs {
  display: flex;
  background: #f1f5f9;
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 24px;
}
.tab {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 9px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all .2s;
  background: transparent;
  color: #727983;
}
.tab.active {
  background: #1a4578;
  color: #fff;

}

/* Google кнопка */
.google-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: #fff;
  border: 1.5px solid #e2e8f0;
  border-radius: 12px;
  color: #1e293b;
  padding: 12px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  margin-bottom: 20px;
  font-family: inherit;
  transition: all .2s;
}
.google-btn:hover {
  border-color: #3b82f6;
  box-shadow: 0 0 0 3px rgba(59,130,246,.1);
}

/* Разделитель */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}
.divider hr {
  flex: 1;
  border: none;
  border-top: 1px solid #e2e8f0;
}
.divider span {
  font-size: 11px;
  color: #94a3b8;
  font-weight: 500;
}

/* Поля */
.field {
  position: relative;
  margin-bottom: 12px;
}
.field input {
  width: 100%;
  background: #f8fafc;
  border: 1.5px solid #e2e8f0;
  border-radius: 12px;
  color: #1e293b;
  padding: 13px 16px;
  font-size: 14px;
  outline: none;
  font-family: inherit;
  transition: all .2s;
}
.field input:focus {
  border-color: #3b82f6;
  background: #fff;
  box-shadow: 0 0 0 3px rgba(59,130,246,.1);
}
.field input.has-eye {
  padding-right: 46px;
}
.eye {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #94a3b8;
  font-size: 16px;
  user-select: none;
}

/* Запомнить */
.remember {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
}
.remember input {
  width: 15px;
  height: 15px;
  accent-color: #3b82f6;
  cursor: pointer;
}
.remember label {
  font-size: 12px;
  color: #343434;
  cursor: pointer;
}

/* Ошибка */
.error {
  color: #ef4444;
  font-size: 12px;
  min-height: 16px;
  margin-bottom: 10px;
  text-align: center;
  font-weight: 500;
}

/* Кнопка входа */
.submit-btn {
  width: 100%;
  background: #1a4578;
  border: none;
  border-radius: 12px;
  color: #fff;
  padding: 14px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all .2s;
 
}
.submit-btn:hover {
  background: #2c61a0;
  
}
.submit-btn:disabled {
  opacity: .6;
  cursor: not-allowed;
}

/* Footer */
.footer {
  text-align: center;
  margin-top: 20px;
  font-size: 11px;
  color: #38393b;
}

/* Мобильный */
@media (max-width: 480px) {
  body { padding: 0; align-items: flex-start; background: #f0f4f8; }
  .card {
    width: 100%;
    min-height: 100vh;
    border-radius: 0;
    box-shadow: none;
    padding: 40px 24px;
  }
}
</style>
</head>
<body>

<div class="card">

  <!-- Логотип -->
  <div class="logo-wrap">
    <img src="MelaLogic-logo.svg" alt="MelaLogic">
    <div class="logo-sub">Für Kleinunternehmer & Regelbesteuerung</div>
  </div>

  <!-- Вкладки -->
  <div class="tabs">
    <button id="tab-login" class="tab active" onclick="setTab('login')">Anmelden</button>
    <button id="tab-register" class="tab" onclick="setTab('register')">Registrieren</button>
  </div>

  <!-- Google -->
  <button class="google-btn" onclick="loginGoogle()">
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.58-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Mit Google anmelden
  </button>

  <!-- Разделитель -->
  <div class="divider">
    <hr><span>oder</span><hr>
  </div>

  <!-- Email -->
  <div class="field">
    <input id="auth-email" type="email" placeholder="Email-Adresse" autocomplete="email">
  </div>

  <!-- Пароль -->
  <div class="field">
    <input id="auth-password" type="password" placeholder="Passwort" autocomplete="current-password" class="has-eye">
    <span class="eye" onclick="togglePwd('auth-password',this)">👁</span>
  </div>

  <!-- Подтверждение пароля (только регистрация) -->
  <div class="field" id="confirm-wrap" style="display:none">
    <input id="auth-password2" type="password" placeholder="Passwort wiederholen" class="has-eye">
    <span class="eye" onclick="togglePwd('auth-password2',this)">👁</span>
  </div>

  <!-- Запомнить (только вход) -->
  <div class="remember" id="remember-wrap">
    <input type="checkbox" id="auth-remember">
    <label for="auth-remember">Angemeldet bleiben</label>
  </div>

  <!-- Ошибка -->
  <div class="error" id="auth-error"></div>

  <!-- Кнопка -->
  <button class="submit-btn" id="auth-btn" onclick="submit()">Anmelden</button>

  <div class="footer">© 2026 MelaLogic · Datenschutz</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = 'https://dvmhstytoonpacxwdxuj.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2bWhzdHl0b29ucGFjeHdkeHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MTY2NzQsImV4cCI6MjA4ODQ5MjY3NH0.oZQD0Dp6mB0pF7hwAQdvQ7_OJe__cBq-MFtAEdB7K84';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let isLogin = true;

// Если уже залогинен — сразу на главную
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) location.href = 'index.html';
});

function setTab(tab) {
  isLogin = tab === 'login';
  document.getElementById('tab-login').classList.toggle('active', isLogin);
  document.getElementById('tab-register').classList.toggle('active', !isLogin);
  document.getElementById('confirm-wrap').style.display = isLogin ? 'none' : 'block';
  document.getElementById('remember-wrap').style.display = isLogin ? 'flex' : 'none';
  document.getElementById('auth-btn').textContent = isLogin ? 'Anmelden' : 'Registrieren';
  document.getElementById('auth-error').textContent = '';
}

function togglePwd(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

async function loginGoogle() {
  const redirectTo = location.href.replace('login.html', 'index.html');
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo }
  });
}

async function submit() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const err = document.getElementById('auth-error');
  const btn = document.getElementById('auth-btn');

  err.textContent = '';
  if (!email || !password) { err.textContent = '❌ Bitte Email und Passwort eingeben.'; return; }
  if (password.length < 6) { err.textContent = '❌ Passwort mindestens 6 Zeichen.'; return; }

  if (!isLogin) {
    const pw2 = document.getElementById('auth-password2').value;
    if (password !== pw2) { err.textContent = '❌ Passwörter stimmen nicht überein.'; return; }
  }

  btn.textContent = '...';
  btn.disabled = true;

  try {
    if (isLogin) {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      location.href = 'index.html';
    } else {
      const { error } = await sb.auth.signUp({ email, password });
      if (error) throw error;
      err.style.color = '#22c55e';
      err.textContent = '✅ Registriert! Bitte jetzt anmelden.';
      btn.disabled = false;
      setTimeout(() => {
        err.style.color = '';
        err.textContent = '';
        setTab('login');
        document.getElementById('auth-email').value = email;
        document.getElementById('auth-password').value = '';
        btn.textContent = 'Anmelden';
      }, 1800);
    }
  } catch(e) {
    err.style.color = '#ef4444';
    err.textContent = translateError(e.message);
    btn.textContent = isLogin ? 'Anmelden' : 'Registrieren';
    btn.disabled = false;
  }
}

function translateError(msg) {
  if (!msg) return '❌ Unbekannter Fehler.';
  if (msg.includes('Invalid login') || msg.includes('invalid_credentials')) return '❌ Falsche Email oder Passwort.';
  if (msg.includes('already registered')) return '❌ Diese Email ist bereits registriert.';
  if (msg.includes('valid email')) return '❌ Bitte gültige Email eingeben.';
  return '❌ ' + msg;
}

// Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') submit();
});
</script>
</body>
</html>
